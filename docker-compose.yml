# =============================================================================
# docker-compose.yml  –  Football Score Predictor
#
# Services
#   backend   – FastAPI + APScheduler  (port 8025)
#   frontend  – Next.js 16 standalone  (port 8026)
#
# The MySQL database runs on the HOST machine, not inside Docker.
# On Linux the backend reaches it via host.docker.internal (enabled below).
# On macOS / Windows Docker Desktop exposes host.docker.internal automatically.
#
# Usage
#   cp .docker-compose.example.env          # set DATABASE_URL host to host.docker.internal
#   docker compose up --build -d
#   docker compose logs -f
# =============================================================================

services:
  mysql:
    image: mysql:8.0
    container_name: sp_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-sp_db}
      MYSQL_USER: ${MYSQL_USER:-sp_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-sp_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init:/docker-entrypoint-initdb.d
    networks:
      - sp_net
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: ${MYSQL_USER:-sp_user}
      PMA_PASSWORD: ${MYSQL_PASSWORD:-sp_password}
    ports:
      - "8080:80"
    networks:
      - sp_net

  # ── Backend (FastAPI) ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sp_backend
    restart: unless-stopped
    env_file: .env
    extra_hosts:
      # Allows containers to reach the host's MySQL on all platforms
      - "host.docker.internal:host-gateway"
    ports:
      - "8025:8025"
    networks:
      - sp_net
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8025/health')" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Frontend (Next.js) ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Baked into the Next.js bundle at build time
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8025/api/v1}
    container_name: sp_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8026:8026"
    networks:
      - sp_net

# =============================================================================
networks:
  sp_net:
    driver: bridge
volumes:
  mysql_data:
